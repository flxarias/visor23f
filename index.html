<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Documentos Visual</title>
    
    <!-- Modern web font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">

    <!-- Database Array from PS script -->
    <script src="database.js"></script>

    <!-- PDF.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>

    <!-- Tesseract.js library -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-content">
                <h1>Visor de Documentos</h1>
                <div class="search-container">
                    <input type="text" id="searchInput" placeholder="Buscar en archivos...">
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </div>
            </div>
        </header>

        <main>
            <div class="loading-state" id="loadingState">
                <div class="spinner"></div>
                <h2>Cargando miniaturas...</h2>
                <p>Procesando PDFs e Imágenes. Esto puede tardar unos segundos la primera vez.</p>
            </div>
            
            <div class="gallery" id="gallery">
                <!-- Document cards will be generated here -->
            </div>
        </main>
    </div>

    <!-- The Lupa (Magnifier) element -->
    <div id="lupaElement" class="lupa"></div>

    <!-- Transcription Modal -->
    <div class="modal" id="transcriptionModal">
        <div class="modal-content">
            <span class="close-btn" id="closeModal">&times;</span>
            <div class="modal-header">
                <h2 id="modalTitle">Extrayendo texto...</h2>
                <span class="badge" id="modalType">PDF</span>
            </div>
            <div class="modal-body">
                <!-- Preview image space -->
                <div class="modal-preview" id="modalPreview"></div>
                <!-- Transcribed text space -->
                <div class="modal-text-container">
                    <div class="controls">
                        <button id="copyBtn" class="btn">Copiar Texto</button>
                    </div>
                    <div id="transcriptionLoading" class="transcription-loading">
                        <div class="spinner small-spinner"></div>
                        <p>Realizando OCR / Extrayendo texto. Por favor, espera...</p>
                    </div>
                    <textarea id="modalText" class="transcription-box" readonly></textarea>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
